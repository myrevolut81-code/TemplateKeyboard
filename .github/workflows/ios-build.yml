# iOS Build with code signing for app and keyboard extension.
# IPA is built directly from the archive (no exportArchive) to preserve extension signatures.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   BUILD_CERTIFICATE_BASE64  - Base64-encoded .p12 (Apple Distribution or Developer)
#   P12_PASSWORD              - Password for the .p12
#   KEYCHAIN_PASSWORD         - Password for the temporary keychain
#   BUILD_PROVISION_PROFILE_BASE64 - Base64-encoded .mobileprovision (must include
#                                    both App ID and Keyboard Extension App ID)
#   TEAM_ID                   - Apple Developer Team ID (e.g. FX8242JHQS)
#
# Ensure project.yml has DEVELOPMENT_TEAM set to your TEAM_ID before generating the project.

name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Create keychain and import certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build-certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive (app + extension signed)
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          mkdir -p build
          xcodebuild archive \
            -project TemplateKeyboard.xcodeproj \
            -scheme TemplateKeyboard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/TemplateKeyboard.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Development"

      - name: Create IPA from archive (preserve code signatures)
        run: |
          # Copy the signed app from the archive (do NOT use exportArchive)
          APP_PATH="build/TemplateKeyboard.xcarchive/Products/Applications/TemplateKeyboard.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at $APP_PATH"
            find build -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r TemplateKeyboard.ipa Payload

      - name: Verify IPA structure and extension signature
        run: |
          unzip -o TemplateKeyboard.ipa -d ipa-verify
          APP_APPEX="ipa-verify/Payload/TemplateKeyboard.app/PlugIns/KeyboardExtension.appex"
          if [ ! -d "$APP_APPEX" ]; then
            echo "Structure:"
            find ipa-verify -type d
            exit 1
          fi
          echo "=== KeyboardExtension.appex signature ==="
          codesign -dv --verbose=4 "$APP_APPEX"
          echo "=== Verification OK ==="

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TemplateKeyboard
          path: TemplateKeyboard.ipa
