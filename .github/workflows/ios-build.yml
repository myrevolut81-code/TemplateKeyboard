# iOS Build — ad-hoc signed IPA for local re-signing (e.g. Sideloadly).
# App and extension are ad-hoc signed during archive; no certificates or profiles in CI.

name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build archive (ad-hoc signed)
        run: |
          mkdir -p build
          xcodebuild archive \
            -project TemplateKeyboard.xcodeproj \
            -scheme TemplateKeyboard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/TemplateKeyboard.xcarchive \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA from archive
        run: |
          APP_PATH="build/TemplateKeyboard.xcarchive/Products/Applications/TemplateKeyboard.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app not found at $APP_PATH"
            find build -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r TemplateKeyboard.ipa Payload

      - name: Verify IPA structure
        run: |
          unzip -o TemplateKeyboard.ipa -d ipa-verify
          APP_APPEX="ipa-verify/Payload/TemplateKeyboard.app/PlugIns/KeyboardExtension.appex"
          if [ ! -d "$APP_APPEX" ]; then
            echo "Structure:"
            find ipa-verify -type d
            exit 1
          fi
          echo "IPA structure OK — extension present"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TemplateKeyboard
          path: TemplateKeyboard.ipa
